server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://187.77.135.46:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /ws/ {
        proxy_pass http://187.77.135.46:18789/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Internal auth subrequest -- nginx calls this before proxying to scrapers
    location = /_auth {
        internal;
        proxy_pass http://187.77.135.46:8080/auth/validate-cookie;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;
    }

    location ^~ /tiktok-scraper/ {
        auth_request /_auth;
        auth_request_set $auth_user_email $upstream_http_x_user_email;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        error_page 401 = @login_redirect;

        proxy_pass http://72.61.162.137:8502/;
        proxy_set_header Host 72.61.162.137:8502;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User $auth_user_email;
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header Accept-Encoding "";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;

        sub_filter_once off;
        sub_filter_types text/html application/javascript text/javascript;
        sub_filter 'src="/' 'src="/tiktok-scraper/';
        sub_filter 'href="/' 'href="/tiktok-scraper/';
        sub_filter "src='/" "src='/tiktok-scraper/";
        sub_filter "href='/" "href='/tiktok-scraper/";
        sub_filter '"/api/' '"/tiktok-scraper/api/';
        sub_filter "'/api/" "'/tiktok-scraper/api/";
    }

    location ^~ /reddit-scraper/ {
        auth_request /_auth;
        auth_request_set $auth_user_email $upstream_http_x_user_email;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        error_page 401 = @login_redirect;

        proxy_pass http://187.127.96.93/;
        proxy_set_header Host 187.127.96.93;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-User $auth_user_email;
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header Accept-Encoding "";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;

        sub_filter_once off;
        sub_filter_types text/html application/javascript text/javascript;
        sub_filter 'src="/' 'src="/reddit-scraper/';
        sub_filter 'href="/' 'href="/reddit-scraper/';
        sub_filter "src='/" "src='/reddit-scraper/";
        sub_filter "href='/" "href='/reddit-scraper/";
        sub_filter '"/api/' '"/reddit-scraper/api/';
        sub_filter "'/api/" "'/reddit-scraper/api/";
    }

    location @login_redirect {
        return 302 /login;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
